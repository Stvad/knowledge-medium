<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>iOS autocaps / pendingIOSKey repro</title>
<style>
  :root { color-scheme: light dark; font: 16px/1.4 -apple-system, system-ui, sans-serif; }
  body { margin: 0; padding: 12px 12px 120px; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  .env { font: 12px/1.35 ui-monospace, Menlo, monospace; background: #0001; padding: 8px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; }
  .scenario-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .scenario-bar button { flex: 1 1 30%; min-height: 52px; font-size: 16px; border-radius: 10px; border: 1px solid #8886; background: #0d6efd22; }
  .scenario-bar button.active { background: #0d6efd; color: #fff; }
  .steps { background: #ffd60022; border: 1px solid #ffd60066; border-radius: 8px; padding: 10px; margin: 10px 0; font-size: 15px; }
  .steps b { font-size: 15px; }
  .editors { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .ed { border: 2px solid #8888; border-radius: 10px; overflow: hidden; }
  .ed > .label { font-size: 13px; font-weight: 600; padding: 6px 10px; background: #8882; }
  .ed.ctrl > .label { background: #19875422; }
  .ed.test > .label { background: #dc354522; }
  .cm-editor { min-height: 88px; font-size: 17px; }
  .cm-content { padding: 10px; }
  .readout { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 12px 0; }
  .card { border: 1px solid #8886; border-radius: 8px; padding: 8px 10px; }
  .card .k { font-size: 12px; color: #888; }
  .card .doc { font: 15px ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; background: #0001; padding: 6px; border-radius: 6px; margin: 4px 0; min-height: 22px; }
  .verdict { font-weight: 700; }
  .verdict.pass { color: #198754; }
  .verdict.fail { color: #dc3545; }
  .verdict.na  { color: #888; }
  .row { display: flex; gap: 8px; }
  .row button { flex: 1; min-height: 40px; border-radius: 8px; border: 1px solid #8886; background: #0002; }
  details { margin-top: 12px; }
  pre.log { font: 11px/1.3 ui-monospace, Menlo, monospace; max-height: 260px; overflow: auto; background: #0001; padding: 8px; border-radius: 8px; }
</style>
<script type="importmap">
{
  "imports": {
    "@codemirror/view": "./vendor/codemirror-view.js",
    "@codemirror/state": "./vendor/codemirror-state.js",
    "crelt": "./vendor/crelt.js",
    "style-mod": "./vendor/style-mod.js",
    "w3c-keyname": "./vendor/w3c-keyname.js",
    "@marijn/find-cluster-break": "./vendor/find-cluster-break.js"
  }
}
</script>
</head>
<body>
<h1>iOS autocaps / <code>pendingIOSKey</code> repro</h1>
<div class="env" id="env">reading environment…</div>

<div class="scenario-bar" id="scenarios"></div>
<div class="steps" id="steps">Pick a scenario above.</div>

<div class="editors">
  <div class="ed ctrl" data-id="ctrl">
    <div class="label">CONTROL — native key (CM's real pendingIOSKey workaround; no preventDefault)</div>
    <div class="host" id="host-ctrl"></div>
  </div>
  <div class="ed test" data-id="test">
    <div class="label">TEST — preventDefault + programmatic edit (workaround REMOVED)</div>
    <div class="host" id="host-test"></div>
  </div>
</div>

<div class="row">
  <button id="reseed">↻ Re-seed both</button>
  <button id="clearlog">🧹 Clear log</button>
</div>

<div class="readout" id="readout"></div>

<details>
  <summary>Event log (keydown / beforeinput / input, capture phase)</summary>
  <pre class="log" id="log"></pre>
</details>

<script type="module">
import { EditorView } from "@codemirror/view"
import { EditorState } from "@codemirror/state"

// ---- environment ----------------------------------------------------------
const ua = navigator.userAgent
const webkit = (/\bAppleWebKit\/(\d+(?:\.\d+)*)/.exec(ua) || [,"?"])[1]
const version = (/\bVersion\/(\d+(?:\.\d+)*)/.exec(ua) || [,"?"])[1]
const mobileTok = (/\bMobile\/(\w+)/.exec(ua) || [,null])[1]
// mirror @codemirror/view's own browser sniff
const safari = /Apple Computer/.test(navigator.vendor)
const iosLike = safari && ((mobileTok != null) || navigator.maxTouchPoints > 2)
const env = {
  userAgent: ua,
  vendor: navigator.vendor,
  AppleWebKit: webkit,          // frozen (~605) across iOS versions — NOT a version discriminator
  SafariVersion: version,       // tracks Safari/iOS major (e.g. 26.0) — the useful gate
  MobileToken: mobileTok,
  maxTouchPoints: navigator.maxTouchPoints,
  platform: navigator.platform,
  "cm browser.safari": safari,
  "cm browser.ios (approx)": iosLike,
}
window.__env = env
document.getElementById("env").textContent = Object.entries(env)
  .map(([k, v]) => `${k}: ${v}`).join("\n")

// ---- event log ------------------------------------------------------------
const LOG = []
window.__log = LOG
function pushLog(src, e) {
  LOG.push({
    t: Math.round(performance.now()),
    src, type: e.type,
    key: e.key, keyCode: e.keyCode,
    inputType: e.inputType, data: e.data,
    defaultPrevented: e.defaultPrevented,
  })
  if (LOG.length > 400) LOG.shift()
  renderLog()
}
function renderLog() {
  document.getElementById("log").textContent =
    LOG.slice(-120).map(r =>
      `${String(r.t).padStart(6)} ${r.src.padEnd(4)} ${r.type.padEnd(11)} ` +
      (r.type.startsWith("key") ? `key=${r.key} code=${r.keyCode}` : `it=${r.inputType} data=${JSON.stringify(r.data)}`) +
      (r.defaultPrevented ? " [prevented]" : "")
    ).join("\n")
}

// ---- editors --------------------------------------------------------------
const contentAttrs = EditorView.contentAttributes.of({
  autocapitalize: "sentences",
  autocorrect: "on",
  spellcheck: "true",
  enterkeyhint: "enter",
})

function logListeners(view, src) {
  for (const type of ["keydown", "beforeinput", "input"]) {
    view.contentDOM.addEventListener(type, e => pushLog(src, e), { capture: true, passive: true })
  }
}

function makeEditor(hostId) {
  const view = new EditorView({
    parent: document.getElementById(hostId),
    state: EditorState.create({
      doc: "",
      extensions: [contentAttrs, EditorView.updateListener.of(u => { if (u.docChanged || u.selectionSet) render() })],
    }),
  })
  return view
}

const CTRL = makeEditor("host-ctrl")
const TEST = makeEditor("host-test")
window.CTRL = CTRL
window.TEST = TEST
logListeners(CTRL, "ctrl")
logListeners(TEST, "test")

// ---- TEST-editor interceptor: reproduce the pre-kludge (no pendingIOSKey) path
// Runs in CAPTURE phase on the .cm-editor wrapper (ancestor of contentDOM) so it
// fires before — and can stopImmediatePropagation away from — CM's own handlers.
// On Enter/Backspace/Delete: preventDefault the native action AND perform the
// edit via a CM transaction, which writes the new DOM selection programmatically
// (the exact "a script moves the DOM selection" condition from codemirror/dev #165).
function editSpec(state, code) {
  const r = state.selection.main
  if (code === 13) return { changes: { from: r.from, to: r.to, insert: "\n" }, selection: { anchor: r.from + 1 } }
  if (code === 8) { const from = r.empty ? Math.max(0, r.from - 1) : r.from; return { changes: { from, to: r.to }, selection: { anchor: from } } }
  if (code === 46) { const to = r.empty ? Math.min(state.doc.length, r.to + 1) : r.to; return { changes: { from: r.from, to }, selection: { anchor: r.from } } }
}
const IT2CODE = { insertParagraph: 13, insertLineBreak: 13, deleteContentBackward: 8, deleteContentForward: 46 }

let lastKeyHandled = -1
TEST.dom.addEventListener("keydown", e => {
  if (e.metaKey || e.altKey || e.ctrlKey || e.shiftKey) return
  if (e.keyCode === 13 || e.keyCode === 8 || e.keyCode === 46) {
    e.preventDefault()
    e.stopImmediatePropagation()
    lastKeyHandled = performance.now()
    TEST.dispatch(editSpec(TEST.state, e.keyCode))
  }
}, { capture: true })

TEST.dom.addEventListener("beforeinput", e => {
  const code = IT2CODE[e.inputType]
  if (!code) return                       // insertText (letters) etc. -> let CM handle it
  e.preventDefault()
  e.stopImmediatePropagation()
  // If the keydown handler already performed this edit, just swallow the native
  // duplicate; otherwise (soft key that emits no keydown) perform it here.
  if (performance.now() - lastKeyHandled > 120) TEST.dispatch(editSpec(TEST.state, code))
}, { capture: true })

// ---- scenarios ------------------------------------------------------------
// Each scenario seeds identical content into both editors, and defines what the
// resulting doc should look like if soft-keyboard autocapitalization still works.
const SCENARIOS = {
  enter: {
    label: "Enter",
    seed: "hello world", anchor: 11,
    steps: `<b>Enter test</b> (soft keyboard).<br>
      1. Tap at the very end of <code>hello&nbsp;world</code>.<br>
      2. Press <b>Return</b>.<br>
      3. Type the letter <b>q</b> — do NOT press Shift.<br>
      Autocaps working → <code>hello world⏎Q</code>. Frozen (bug) → <code>hello world⏎q</code>.`,
    check: (doc) => {
      const m = /\n([A-Za-z])/.exec(doc)
      if (!m) return { state: "na", msg: "no newline+letter yet" }
      return m[1] === m[1].toUpperCase() && m[1] !== m[1].toLowerCase()
        ? { state: "pass", msg: `capitalized → "${m[1]}" (autocaps works)` }
        : { state: "fail", msg: `lowercase → "${m[1]}" (autocaps FROZEN)` }
    },
  },
  backspace: {
    label: "Backspace",
    seed: "Hi. ab", anchor: 6,
    steps: `<b>Backspace test</b> (soft keyboard).<br>
      1. Tap at the very end of <code>Hi.&nbsp;ab</code>.<br>
      2. Press <b>Backspace</b> twice (deletes “b” then “a”; caret lands right after “. ”).<br>
      3. Type the letter <b>q</b> — do NOT press Shift.<br>
      Autocaps working → <code>Hi. Q</code>. Frozen (bug) → <code>Hi. q</code>.`,
    check: (doc) => {
      const m = /^Hi\. ([A-Za-z])/.exec(doc)
      if (!m) return { state: "na", msg: `waiting — doc is ${JSON.stringify(doc)}` }
      return m[1] === m[1].toUpperCase() && m[1] !== m[1].toLowerCase()
        ? { state: "pass", msg: `capitalized → "${m[1]}" (autocaps works)` }
        : { state: "fail", msg: `lowercase → "${m[1]}" (autocaps FROZEN)` }
    },
  },
  delete: {
    label: "Delete (HW kbd)",
    seed: "Hi. xy", anchor: 4,
    steps: `<b>Delete test</b> — needs a <b>hardware keyboard</b> (forward-delete isn't on the soft keyboard, and autocaps is a soft-keyboard feature, so this is a sanity probe, not a true autocaps case).<br>
      1. Tap between “. ” and “xy” (caret at offset 4).<br>
      2. Press <b>fn+Delete</b> (forward delete) twice → <code>Hi.&nbsp;</code>.<br>
      3. Observe the edit applied cleanly. Autocaps N/A on a hardware keyboard.`,
    check: (doc) => {
      if (doc === "Hi. ") return { state: "pass", msg: "forward-delete applied cleanly" }
      return { state: "na", msg: `doc is ${JSON.stringify(doc)}` }
    },
  },
}
let active = "enter"

function seed(view, text, anchor) {
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text }, selection: { anchor } })
}
function reseed() {
  const s = SCENARIOS[active]
  seed(CTRL, s.seed, s.anchor)
  seed(TEST, s.seed, s.anchor)
  render()
}
function setScenario(name) {
  active = name
  document.querySelectorAll("#scenarios button").forEach(b => b.classList.toggle("active", b.dataset.name === name))
  document.getElementById("steps").innerHTML = SCENARIOS[name].steps
  reseed()
}

// ---- readout --------------------------------------------------------------
function trailingCaseHint(doc) {
  const m = /([A-Za-z])(?=[^A-Za-z]*$)/.exec(doc)
  if (!m) return ""
  const c = m[1]
  return ` · last letter "${c}" is ${c === c.toUpperCase() && c !== c.toLowerCase() ? "UPPER" : "lower"}case`
}
function render() {
  const s = SCENARIOS[active]
  const ro = document.getElementById("readout")
  const editors = [["CONTROL (native)", CTRL], ["TEST (preventDefault + programmatic)", TEST]]
  ro.innerHTML = editors.map(([name, v]) => {
    const doc = v.state.doc.toString()
    const sel = v.state.selection.main
    const res = s.check(doc)
    return `<div class="card">
      <div class="k">${name} · sel ${sel.from}${sel.empty ? "" : "–" + sel.to}${trailingCaseHint(doc)}</div>
      <div class="doc">${escapeHtml(doc) || "<i>(empty)</i>"}</div>
      <div class="verdict ${res.state}">${res.state.toUpperCase()} — ${res.msg}</div>
    </div>`
  }).join("")
}
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])).replace(/\n/g, "⏎\n") }

// snapshot helper for the debug bridge
window.snap = () => ({
  scenario: active,
  ctrl: CTRL.state.doc.toString(), ctrlSel: { ...CTRL.state.selection.main },
  test: TEST.state.doc.toString(), testSel: { ...TEST.state.selection.main },
  env: window.__env,
})
window.setScenario = setScenario
window.reseedRepro = reseed

// ---- wire UI --------------------------------------------------------------
const bar = document.getElementById("scenarios")
for (const [name, s] of Object.entries(SCENARIOS)) {
  const b = document.createElement("button")
  b.dataset.name = name
  b.textContent = s.label
  b.addEventListener("click", () => setScenario(name))
  bar.appendChild(b)
}
document.getElementById("reseed").addEventListener("click", reseed)
document.getElementById("clearlog").addEventListener("click", () => { LOG.length = 0; renderLog() })

setScenario("enter")
</script>
</body>
</html>
