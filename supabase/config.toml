project_id = "knowledge-medium"

[auth]
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://localhost:4173",
  "http://127.0.0.1:4173",
]
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
# OTP-code flow: the code in the email is the credential the user types back.
# Disable email-confirmation links so the same template is used for new and
# returning users.
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your sign-in code"
content_path = "./supabase/templates/magic_link.html"
