project_id = "thought-medium"

[auth]
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://localhost:4173",
  "http://127.0.0.1:4173",
]
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
# OTP-code flow: the code in the email is the credential the user types back.
# Disable email-confirmation links so the same template is used for new and
# returning users.
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your sign-in code"
content_path = "./supabase/templates/magic_link.html"

# Media attachments bucket (design §10). Declared here so a local `supabase start`
# provisions it on boot — the migration that creates it on the hosted project is
# guarded out locally because the Storage tables don't exist at migration time
# (see supabase/migrations/20260625000000_add_attachments_storage.sql). config.toml
# can't declare storage.objects RLS policies; apply the migration's policies
# against the local stack once Storage is up when exercising RLS locally.
[storage.buckets.attachments]
public = false
file_size_limit = "50MiB"
