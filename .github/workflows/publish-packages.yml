name: Publish packages

# Publish-on-version-change: after a green "Run Tests" on master, publish any
# workspace package whose package.json version isn't on npm yet. Bump a
# package's version in your PR and the merge releases it; leave it and this is a
# no-op. See scripts/publish-packages.mjs for the per-package logic.
on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]
  # Manual re-run against the current master (e.g. to smoke-test the pipeline).
  workflow_dispatch:

# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. GitHub mints a
# short-lived id-token this job exchanges with npm; npm checks it against the
# trusted publisher registered on each package (repo + this workflow filename).
# id-token: write is what lets that token be requested; it also auto-attaches
# provenance to the publish.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # Only after Run Tests *succeeded*, and only for a push to master — not PRs
    # or the workflow_dispatch on Run Tests. workflow_dispatch here bypasses the
    # gate (there's no workflow_run payload) and runs against the default branch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Build/publish the exact commit Run Tests validated (falls back to
          # the ref that triggered a manual dispatch).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; the version bundled with
      # node 24.x can be older. Upgrade the global npm the publish step uses.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Build both packages (incl. agent-cli's generated kernel-types) up front,
      # so agent-dispatch's tsc -b has agent-cli's dist even when only one of the
      # two is being republished. Each package's own prepublishOnly rebuild then
      # runs incrementally.
      - name: Build packages
        run: yarn run compile

      - name: Publish changed packages
        run: node scripts/publish-packages.mjs
