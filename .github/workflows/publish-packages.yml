name: Publish packages

# Publish-on-version-change: after a green "Run Tests" on master, publish any
# workspace package whose package.json version isn't on npm yet. Bump a
# package's version in your PR and the merge releases it; leave it and this is a
# no-op. See scripts/publish-packages.mjs for the per-package logic.
on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]
  # Manual re-run against the current master (e.g. to smoke-test the pipeline).
  workflow_dispatch:

# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. GitHub mints a
# short-lived id-token this job exchanges with npm; npm checks it against the
# trusted publisher registered on each package (repo + this workflow filename).
# id-token: write is what lets that token be requested; it also auto-attaches
# provenance to the publish.
permissions:
  contents: read
  id-token: write

# Serialize publish runs: the version check (npm view) and the publish are not
# atomic, so two overlapping runs on the same version would race and the loser
# would 403. Queue instead of cancel — never kill an in-flight npm publish.
concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    # Two ways in, both restricted to master:
    #  - workflow_run: only after Run Tests *succeeded* for a push to master
    #    (a fork PR runs Run Tests as event 'pull_request', never 'push', so it
    #    can't reach this job / the OIDC token).
    #  - workflow_dispatch: a manual master-only re-run (there's no workflow_run
    #    payload, so it bypasses the success gate — hence the explicit ref check,
    #    or a dispatch against any other branch could publish untested code).
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Build/publish the exact commit Run Tests validated (falls back to
          # the ref that triggered a manual dispatch).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; node 24.x bundles an older
      # npm. Pin to a specific 11.x rather than @latest: @latest currently
      # resolves to npm 12.0.0, which crashes provenance generation with
      # "Cannot find module 'sigstore'" (npm/cli#9722) and broke the first real
      # run of this workflow. Bump deliberately once that's fixed and released.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # No separate build step: each package's prepublishOnly builds it during
      # `npm publish` (agent-dispatch's `tsc -b` builds agent-cli first via its
      # project reference; agent-cli's own prepublishOnly does its full build).
      # A whole-app `yarn run compile` here was redundant and coupled publishing
      # to unrelated src/ breakage.
      - name: Publish changed packages
        run: node scripts/publish-packages.mjs
