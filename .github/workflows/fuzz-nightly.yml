# Nightly deep fuzz run (see docs/fuzzing.md).
#
# The *.fuzz.test.ts suites already run in the PR gate as a small
# fixed-seed smoke tier; this job is the deep tier — fresh random seeds
# and a real time budget per property, so new input territory gets
# explored every night. Two passes: a budget across every suite, then a
# long dedicated pass on the stateful data-layer fuzzer (highest
# bug-yield per minute, so it gets the lion's share).
#
# On failure: both passes' vitest logs (each of which, if it failed,
# contains fast-check's failing seed + path + shrunk counterexample) are
# uploaded as an artifact, and an issue is filed (or a comment added to
# the existing open one). The issue body is built ONLY from the log(s) of
# the pass(es) that actually failed — a pass 2 pass after a pass 1
# failure must not bury the seed under green output — and leads with the
# list of failing test files, then a static triage note (convergence
# deep-tier red is expected while #381 is open), then a best-effort
# seed/repro excerpt; the full logs are always in the artifact. Report
# building lives in `node scripts/fuzz.mjs --report`.
name: Nightly Fuzz

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:
    inputs:
      time_ms:
        description: 'Per-property time budget in ms (all-suites pass)'
        default: '15000'
      stateful_time_ms:
        description: 'Time budget in ms for the dedicated stateful pass'
        default: '1200000'

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # An explicit `shell: bash` already runs `bash -eo pipefail` (GitHub
      # Actions docs, "Exit codes and error action preference"), so a fuzz
      # failure is not masked by `tee`. The `set -o pipefail` below is
      # belt-and-suspenders: it keeps the invariant local, so removing the
      # (seemingly redundant on Linux) `shell:` line can't silently green
      # the nightly.
      - name: Deep fuzz — all suites
        id: sweep
        shell: bash
        env:
          FUZZ_TIME_MS: ${{ inputs.time_ms || '15000' }}
        run: |
          set -o pipefail
          yarn fuzz 2>&1 | tee fuzz-sweep.log

      - name: Deep fuzz — stateful data-layer suite (long pass)
        id: stateful
        # Run even when the sweep above failed — a sweep failure should
        # not cost us the night's stateful signal (both logs are
        # inspected independently when building the failure issue below).
        if: ${{ !cancelled() }}
        shell: bash
        env:
          FUZZ_TIME_MS: ${{ inputs.stateful_time_ms || '1200000' }}
        run: |
          set -o pipefail
          yarn fuzz src/data/test/repoMutators.fuzz.test.ts 2>&1 | tee fuzz-stateful.log

      - name: Upload fuzz logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-output
          path: |
            fuzz-sweep.log
            fuzz-stateful.log
          if-no-files-found: warn
          retention-days: 30

      # Step failures only. A job-timeout cancellation is reported by the
      # separate `report-cancellation` job below — post-cancel steps inside
      # THIS job aren't a reliable place to run (GitHub cancels the job).
      # The timeout path is also remote by construction: scripts/fuzz.mjs
      # caps vitest's own testTimeout well below timeout-minutes, so vitest
      # is the killer for a hung case, which lands here as failure().
      - name: File or update failure issue
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SWEEP_OUTCOME: ${{ steps.sweep.outcome }}
          STATEFUL_OUTCOME: ${{ steps.stateful.outcome }}
        run: |
          # Failing-file extraction, the seed/repro excerpt, and the
          # standing-#381 triage note are all built by
          # `node scripts/fuzz.mjs --report` (kept in JS, not shell, so
          # the vitest-output parsing is testable — see that file). Only
          # pass logs for steps that actually failed — a passing pass 2
          # after a failing pass 1 must not bury the seed under green
          # output.
          failing=()
          [ "$SWEEP_OUTCOME" = "failure" ] && failing+=("Deep fuzz — all suites|fuzz-sweep.log")
          [ "$STATEFUL_OUTCOME" = "failure" ] && failing+=("Deep fuzz — stateful data-layer suite (long pass)|fuzz-stateful.log")

          body=$(node scripts/fuzz.mjs --report "${failing[@]}")

          existing=$(gh issue list --label fuzz-failure --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Nightly fuzz failure ($(date -u +%Y-%m-%d))" \
              --label bug,fuzz-failure,P2,ci \
              --body "$body"
          fi

  # Separate dependent job: a job-timeout CANCELS the fuzz job, and
  # post-cancel steps inside it aren't guaranteed to run — this job is
  # scheduled independently, so a hung/overlong nightly can't go silent.
  # No log excerpt here (the logs live on the cancelled job's runner;
  # the artifact only exists if its upload step got to run) — just the
  # run URL.
  report-cancellation:
    runs-on: ubuntu-latest
    needs: fuzz
    # needs.fuzz.result, not cancelled(): a job-level timeout cancels the
    # JOB; workflow-level cancelled() stays false unless the whole run was
    # cancelled. always() lets this job be scheduled despite the upstream
    # cancellation; the result check narrows it to the cancel case.
    if: ${{ always() && needs.fuzz.result == 'cancelled' }}
    timeout-minutes: 5
    steps:
      - name: File or update timeout/cancellation issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body="Nightly fuzz run was cancelled — most likely the 90-minute job timeout (a hung case that vitest's own testTimeout failed to kill). Logs, if captured, are in the run's fuzz-output artifact: $RUN_URL"
          existing=$(gh issue list --label fuzz-failure --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Nightly fuzz timeout/cancellation ($(date -u +%Y-%m-%d))" \
              --label bug,fuzz-failure,P2,ci \
              --body "$body"
          fi
