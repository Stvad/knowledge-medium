name: Run Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  repository_dispatch:

# A newer push to the same branch/PR supersedes the in-flight run — cancel it
# instead of paying for both. Master pushes keep their own per-sha groups
# (github.ref is refs/heads/master for all of them, so guard with run_id) so a
# merge train never cancels the run that would have caught a bad merge.
concurrency:
  group: run-tests-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Social Publisher extension dependencies
        run: pnpm -C agent-extensions/social-media-publisher install --frozen-lockfile

      # Persist the incremental build caches across runs: tsgo -b (the check
      # gate's compiler; plain tsc for compile:tsc/compile:packages) writes
      # node_modules/.tmp/*.tsbuildinfo, eslint --cache writes
      # node_modules/.cache/eslint. Both live under node_modules and are wiped
      # on a cold runner. The key hashes the tsconfig/eslint config + rules +
      # lockfile, so any change to type config, lint rules, or deps busts the
      # cache (a stale eslint cache would otherwise false-pass after a rule
      # change). The run-unique suffix saves a fresh cache each run; the
      # restore-keys prefix falls back to the latest cache with the same config
      # for incremental reuse. tsc's content-hash invalidation keeps the
      # tsbuildinfo reuse sound.
      - name: Cache tsc + eslint build state
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.tmp
            node_modules/.cache/eslint
          key: build-${{ runner.os }}-${{ hashFiles('tsconfig*.json', 'packages/agent-cli/tsconfig.json', 'eslint.config.js', 'eslint-rules/**', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ hashFiles('tsconfig*.json', 'packages/agent-cli/tsconfig.json', 'eslint.config.js', 'eslint-rules/**', 'pnpm-lock.yaml') }}-

      - name: Run checks
        run: pnpm run check

      - name: Generate agent extension type stubs
        run: pnpm agent types --force

      - name: Run Social Publisher extension checks
        run: pnpm -C agent-extensions/social-media-publisher run check
