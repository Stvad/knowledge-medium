name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# We publish the production build to the `gh-pages` branch (root) rather than
# via the Pages *artifact* flow (actions/deploy-pages). This is what lets PR
# previews coexist: the same branch also holds `pr-preview/pr-<n>/` subtrees
# (see pr-preview.yml). Pages must therefore be configured as
# "Deploy from a branch: gh-pages / (root)" — see docs/pr-preview-deployments.md.
permissions:
  contents: write # push the built site to the gh-pages branch
  id-token: write # required by actions/attest-build-provenance
  attestations: write # required by actions/attest-build-provenance
  pages: write # request a Pages rebuild if the auto-publish flakes (ensure-pages-published.sh)

concurrency:
  # Production-only group. Kept SEPARATE from the per-PR preview group so a
  # queued preview can never cancel a queued production deploy. cancel-in-progress
  # is false so we never interrupt an in-flight `git push` to gh-pages mid-write;
  # rapid master pushes queue and the latest wins.
  group: deploy-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_POWERSYNC_URL: ${{ vars.VITE_POWERSYNC_URL || secrets.VITE_POWERSYNC_URL }}
      # Vite inlines this into the client bundle, so the key is
      # effectively public — protection comes from the HTTP-referrer
      # restriction on the GCP key itself (see docs/domain-onboarding.md).
      VITE_GOOGLE_MAPS_API_KEY: ${{ vars.VITE_GOOGLE_MAPS_API_KEY || secrets.VITE_GOOGLE_MAPS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Validate build variables
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_ANON_KEY"
          test -n "$VITE_POWERSYNC_URL"
          test -n "$VITE_GOOGLE_MAPS_API_KEY"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Build provenance / tamper-evidence for the deployed client build.
      # This is a transparency/detection mitigation only: it lets anyone
      # verify a served file matches what this workflow built from this
      # commit. It does NOT prevent a targeted backdoor (that needs a
      # runtime verifier, which is out of scope here).
      #
      # SHA256SUMS lists the sha256 of every file shipped to Pages and is
      # itself published at /<repo>/SHA256SUMS. The provenance attestation
      # below signs just this manifest; because the manifest commits to
      # every file's hash, the signature transitively covers the whole
      # build (the standard "signed sums" pattern).
      #
      # Verify, given a deployed site:
      #   1. Fetch the served files and SHA256SUMS, then `sha256sum -c
      #      SHA256SUMS` to confirm served bytes match the manifest.
      #   2. Confirm the manifest's provenance (signed Sigstore attestation
      #      logged to the public Rekor transparency log):
      #        gh attestation verify SHA256SUMS --owner Stvad
      #      which binds the manifest digest -> this workflow -> this commit.
      - name: Generate SHA256SUMS manifest
        run: cd dist && find . -type f ! -name SHA256SUMS -exec sha256sum {} \; | sort -k2 > SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/SHA256SUMS

      # Publish to the gh-pages branch root. `clean-exclude: pr-preview`
      # preserves the live PR-preview subtrees on the branch, and
      # `force: false` does a normal (fetch + rebase) push so a concurrent
      # preview deploy isn't force-overwritten. Together these are what make
      # production and previews share one branch safely.
      - name: Deploy to GitHub Pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean-exclude: pr-preview
          force: false

      # The push above only updates the branch; GitHub's auto-triggered "pages
      # build and deployment" is what actually publishes it, and that publisher
      # is intermittently flaky ("Deployment failed, try again later."). Without
      # this, a flaked publish leaves the new build un-served until the next
      # push. This waits for the publish and re-requests it on failure.
      - name: Ensure Pages published
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ensure-pages-published.sh
