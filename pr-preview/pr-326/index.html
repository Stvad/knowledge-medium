    <!-- interactive-widget=resizes-content shrinks the LAYOUT viewport when the on-screen keyboard opens, so the mobile editing toolbar (position:fixed; bottom:0) rides above the keyboard on Chromium (Chrome/Edge/Samsung) and Firefox. Safari ignores the key: there the layout viewport stays full-height and fixed elements are layout-anchored, so bottom:0 sits BEHIND the keyboard and useKeyboardInset supplies the lift instead. Load-bearing for src/plugins/mobile-keyboard-toolbar. -->

    <script>
      // Resolve the persisted theme before paint so we don't flash the
      // default palette. Keep the storage key in sync with
      // THEME_STORAGE_KEY in src/plugins/theme-toggle/theme.ts and the
      // default ids in sync with DEFAULT_THEME_ID_LIGHT / _DARK in
      // src/plugins/default-themes/themes.ts. Unknown stored values
      // fall through to the :root defaults in src/index.css until the
      // theme-toggle style-sync effect injects the matching rule.
      (function () {
        try {
          var stored = window.localStorage.getItem('theme')
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme =
            stored || (prefersDark ? 'sunset-warm-dark' : 'sunset-warm-light')
        } catch (e) {
          document.documentElement.dataset.theme = 'sunset-warm-light'
        }
      })()
    </script>
